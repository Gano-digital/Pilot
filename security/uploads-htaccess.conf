# ==============================================================================
# uploads-htaccess.conf
# Security rules for wp-content/uploads/ directory.
#
# DEPLOY TO: ~/public_html/wp-content/uploads/.htaccess
#
# WHY:
#   Attackers commonly upload PHP web shells disguised as images or media files.
#   Once uploaded, they request the file directly to execute arbitrary code.
#   This .htaccess blocks PHP execution in the uploads directory entirely,
#   so even if a malicious PHP file is uploaded it cannot be executed.
#
# USAGE:
#   Deployed automatically by the "Deploy Security Files" GitHub Actions workflow,
#   or manually: copy this file to ~/public_html/wp-content/uploads/.htaccess
# ==============================================================================

# Block direct execution of PHP files in the uploads directory.
# This covers all common PHP extensions used by web shells.
<FilesMatch "\.(php|php5|php7|phtml|phar|phps)$">
    Order Allow,Deny
    Deny from all
</FilesMatch>

# Disable directory listing in uploads
Options -Indexes

# Force download for SVG/XML files to prevent SVG-based XSS attacks.
# This does NOT break SVG display in <img> tags, only prevents inline
# rendering when the file URL is opened directly in the browser.
<FilesMatch "\.(svg|svgz|xml|xsl|xslt|xhtml)$">
    Header set Content-Disposition "attachment"
    Header set X-Content-Type-Options "nosniff"
</FilesMatch>
