# ==============================================================================
# htaccess-security.conf
# Apache security hardening rules for GoDaddy shared hosting (WordPress).
#
# USAGE:
#   Copy the contents of this file into your site's .htaccess file, or include
#   it via Apache's Include directive if your hosting plan supports it.
#
#   To apply automatically, run:
#     bash security/firewall-rules.sh --web-root /path/to/public_html
#
# IMPORTANT:
#   Always back up your existing .htaccess before making changes.
#   Test on a staging environment first.
# ==============================================================================

# ── 1. Disable directory listing ─────────────────────────────────────────────
Options -Indexes

# ── 2. Deny access to sensitive files ────────────────────────────────────────
<FilesMatch "(wp-config\.php|\.env|\.git|\.htpasswd|\.DS_Store|phpinfo\.php|readme\.html|license\.txt|composer\.(json|lock)|package(-lock)?\.json|yarn\.lock|Makefile|Dockerfile|\.travis\.yml|\.github)$">
    Order Allow,Deny
    Deny from all
</FilesMatch>

# ── 3. Block XML-RPC (common brute-force and DDoS vector) ────────────────────
# Remove this block only if you use Jetpack or another XML-RPC-dependent plugin.
<Files "xmlrpc.php">
    Order Deny,Allow
    Deny from all
</Files>

# ── 4. Protect wp-includes from direct PHP execution ─────────────────────────
<IfModule mod_rewrite.c>
    RewriteEngine On
    RewriteBase /
    RewriteRule ^wp-admin/includes/ - [F,L]
    RewriteRule !^wp-includes/ - [S=3]
    RewriteRule ^wp-includes/[^/]+\.php$ - [F,L]
    RewriteRule ^wp-includes/js/tinymce/langs/.+\.php - [F,L]
    RewriteRule ^wp-includes/theme-compat/ - [F,L]
</IfModule>

# ── 5. Block common attack payloads in query strings ─────────────────────────
<IfModule mod_rewrite.c>
    RewriteEngine On

    # Reject empty User-Agent
    RewriteCond %{HTTP_USER_AGENT} ^-?$
    RewriteRule ^ - [F,L]

    # Block known scanner / exploit tool user-agents
    RewriteCond %{HTTP_USER_AGENT} (sqlmap|nikto|nmap|masscan|ZGrab|nuclei|dirbuster|gobuster|wfuzz|hydra|acunetix|nessus|openvas|havij|pangolin|jbrofuzz|skipfish|w3af|zgrab|httpscan|python-requests/2\.[0-9]+\.[0-9]+) [NC,OR]
    RewriteCond %{HTTP_USER_AGENT} (Wget/1\.(9|10|11|12|13|14)|libwww-perl) [NC]    RewriteRule ^ - [F,L]

    # Block path traversal
    RewriteCond %{QUERY_STRING} (\.\./|\.\.%2F|%2F\.\.) [NC]
    RewriteRule ^ - [F,L]

    # Block NULL byte injection
    RewriteCond %{QUERY_STRING} (%00) [NC]
    RewriteRule ^ - [F,L]

    # Block SQL injection patterns
    RewriteCond %{QUERY_STRING} (union.*select|select.*from|drop\s+table|insert\s+into|delete\s+from|update\s+set|benchmark\s*\(|sleep\s*\(|load_file\s*\() [NC]
    RewriteRule ^ - [F,L]

    # Block XSS payloads in query strings
    RewriteCond %{QUERY_STRING} (<script[\s>]|javascript:|vbscript:|onload\s*=|onerror\s*=|alert\s*\() [NC]
    RewriteRule ^ - [F,L]

    # Block remote file inclusion attempts
    RewriteCond %{QUERY_STRING} (http|https|ftp)\:\/\/ [NC]
    RewriteCond %{QUERY_STRING} (include|require)(_once)?\s*\( [NC]
    RewriteRule ^ - [F,L]

    # Block PHP code injection in query strings
    RewriteCond %{QUERY_STRING} (base64_decode\(|eval\s*\(|passthru\s*\(|system\s*\(|exec\s*\(|shell_exec\s*\(|phpinfo\s*\(\)) [NC]
    RewriteRule ^ - [F,L]
</IfModule>

# ── 6. Security response headers ─────────────────────────────────────────────
<IfModule mod_headers.c>
    # Prevent clickjacking
    Header always set X-Frame-Options "SAMEORIGIN"

    # Prevent MIME-type sniffing
    Header always set X-Content-Type-Options "nosniff"

    # Enable XSS filter in older browsers
    Header always set X-XSS-Protection "1; mode=block"

    # Control referrer information
    Header always set Referrer-Policy "strict-origin-when-cross-origin"

    # Restrict browser features
    Header always set Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()"

    # Enforce HTTPS for 1 year (enable only after confirming HTTPS works)
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains; preload"

    # Content Security Policy – adjust domains to match your actual CDN/fonts/analytics
    Header always set Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://esm.sh; style-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com; img-src 'self' data: https:; font-src 'self' https:; connect-src 'self' https://generativelanguage.googleapis.com; frame-ancestors 'none';"

    # Remove server version information
    Header unset Server
    Header always unset X-Powered-By
    Header always unset X-AspNet-Version
</IfModule>

# ── 7. Hide server signature ──────────────────────────────────────────────────
ServerSignature Off

# ── 8. Block PHP execution in the uploads directory ──────────────────────────
# (This rule should also exist in wp-content/uploads/.htaccess)
<IfModule mod_rewrite.c>
    RewriteRule ^wp-content/uploads/.*\.(php|php5|phtml|phar)$ - [F,NC,L]
</IfModule>

# ── 9. Limit HTTP request methods ────────────────────────────────────────────
<LimitExcept GET POST HEAD>
    Order Deny,Allow
    Deny from all
</LimitExcept>

# ── 10. Force HTTPS redirect ──────────────────────────────────────────────────
<IfModule mod_rewrite.c>
    RewriteEngine On
    RewriteCond %{HTTPS} off
    RewriteRule ^(.*)$ https://%{HTTP_HOST}/$1 [R=301,L]
</IfModule>

# ── 11. WordPress core rewrite rules (standard – do not remove) ──────────────
<IfModule mod_rewrite.c>
    RewriteEngine On
    RewriteBase /
    RewriteRule ^index\.php$ - [L]
    RewriteCond %{REQUEST_FILENAME} !-f
    RewriteCond %{REQUEST_FILENAME} !-d
    RewriteRule . /index.php [L]
</IfModule>
