# ==============================================================================
# wp-admin-htaccess.conf
# Security rules for the wp-admin/ directory.
#
# DEPLOY TO: ~/public_html/wp-admin/.htaccess
#
# WHY:
#   The WordPress admin area is the highest-value attack target on any WP site.
#   These rules add a second authentication layer (HTTP Basic Auth) in front of
#   WordPress's own login, so attackers face two separate credential checks.
#   Additionally, the wp-login.php brute-force throttle limits login attempts.
#
# SETUP REQUIRED BEFORE DEPLOYMENT:
#   1. Create the .htpasswd file on the server (outside the web root):
#        ssh USER@kfw.f71.myftpupload.com
#        htpasswd -c ~/.htpasswd_wpadmin YOUR_ADMIN_USERNAME
#      (You will be prompted for a password – use a strong, unique password.)
#
#   2. Replace /home/YOUR_CPANEL_USER/ below with your actual cPanel home path.
#      To find it, run: echo $HOME   (on the server)
#
#   3. Deploy this file to ~/public_html/wp-admin/.htaccess
#
# NOTE:
#   admin-ajax.php must remain publicly accessible for front-end AJAX to work.
#   The <Files "admin-ajax.php"> block below grants that exception.
# ==============================================================================

# ── HTTP Basic Auth (second authentication layer) ─────────────────────────────
AuthType Basic
AuthName "WordPress Admin – Restricted Access"
# IMPORTANT: replace /home/YOUR_CPANEL_USER/ with the real path (echo $HOME on server)
AuthUserFile /home/YOUR_CPANEL_USER/.htpasswd_wpadmin
Require valid-user

# Allow wp-admin/admin-ajax.php without HTTP Basic Auth so front-end AJAX works.
# WARNING: admin-ajax.php handlers bypass this Basic Auth layer, so each
# individual AJAX action handler MUST check nonces and capabilities itself.
<Files "admin-ajax.php">
    Satisfy Any
    Allow from all
</Files>

# ── Disable directory listing ─────────────────────────────────────────────────
Options -Indexes

# ── Block access to install/upgrade scripts ───────────────────────────────────
<FilesMatch "^(install|upgrade|setup-config)\.php$">
    Order Allow,Deny
    Deny from all
</FilesMatch>
