# Kimi CLI Configuration for Gano Digital
# Kimi acts as autonomous development assistant parallel to Claude Code

project:
  name: "Gano Digital"
  description: "WordPress Reseller Platform with Design System"
  root: "C:\\Users\\diego\\Downloads\\Gano.digital-copia"
  branch: "main"

ai:
  provider: "claude"
  model: "claude-3-5-sonnet"
  context_window: 200000
  max_tokens: 4096

execution:
  auto_execute_commands: true
  auto_edit_files: true
  require_approval: false
  max_concurrent_tasks: 2
  timeout_seconds: 1800

shell:
  type: "powershell"
  cwd: "C:\\Users\\diego\\Downloads\\Gano.digital-copia"

logging:
  level: "INFO"
  file: "wiki/dev-sessions/kimi-session.log"
  format: "json"

memory:
  auto_save: true
  directory: "C:\\Users\\diego\\.claude\\projects\\C--Users-diego\\memory"

mcp:
  enabled: true
  tools:
    - "file_operations"
    - "web_fetch"
    - "git_operations"
