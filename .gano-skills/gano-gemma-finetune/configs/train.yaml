# Config de entrenamiento QLoRA — gano-gemma v1
# SOTA abril 2026 (Unsloth + PEFT + TRL)

model:
  base: google/gemma-3n-E4B-it
  load_in_4bit: true
  max_seq_length: 2048

lora:
  r: 16
  alpha: 16
  dropout: 0.0
  target_modules: all-linear
  bias: none

training:
  output_dir: ./outputs/gano-style-v1
  num_train_epochs: 3
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 4
  learning_rate: 2.0e-4
  lr_scheduler_type: cosine
  warmup_ratio: 0.03
  weight_decay: 0.01
  optim: adamw_8bit
  gradient_checkpointing: unsloth
  logging_steps: 10
  save_strategy: epoch
  seed: 42

dataset:
  path: ./datasets/gano-sft-v1.jsonl
  format: messages
  chat_template: gemma  # CRÍTICO — debe coincidir con el del export

export:
  merge_adapter: true
  gguf_quant: q4_k_m
  ollama_modelfile: ./Modelfile
