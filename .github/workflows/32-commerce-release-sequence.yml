name: "32 · Release · Commerce Sequence"

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  security_quality:
    name: "1) Security + Quality"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"

      - name: PHP lint (templates + functions)
        run: |
          php -l wp-content/themes/gano-child/functions.php
          php -l wp-content/themes/gano-child/front-page.php
          php -l wp-content/themes/gano-child/templates/shop-premium.php
          php -l wp-content/themes/gano-child/templates/page-ecosistemas.php
          php -l wp-content/themes/gano-child/templates/page-seo-landing.php
          php -l wp-content/themes/gano-child/templates/page-sota-hub.php
          php -l wp-content/themes/gano-child/templates/page-diagnostico-digital.php
          php -l wp-content/themes/gano-child/templates/page-nosotros.php
          php -l wp-content/themes/gano-child/templates/page-contacto.php

  uiux_gate:
    name: "2) UI/UX Gate"
    runs-on: ubuntu-latest
    needs: security_quality
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run UI/UX static checks
        run: python scripts/qa_catalog_release.py --gate uiux

  content_gate:
    name: "3) Content Gate"
    runs-on: ubuntu-latest
    needs: uiux_gate
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run content static checks
        run: python scripts/qa_catalog_release.py --gate content

  verification:
    name: "4) Final Verification"
    runs-on: ubuntu-latest
    needs: content_gate
    steps:
      - name: Final summary
        run: echo "Commerce release sequence completed successfully."
