# Escaneo de secretos solo en código propio (sin vendor de Elementor / plugins de terceros).
name: Secret scan (TruffleHog)

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trufflehog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install TruffleHog (pip)
        run: |
          pip install "trufflehog>=3.63,<4"
          trufflehog --version

      - name: Scan Gano custom paths only
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          for target in wp-content/mu-plugins wp-content/themes/gano-child wp-content/plugins/gano-*; do
            echo "::group::Scan $target"
            trufflehog filesystem "$target" --only-verified
            echo "::endgroup::"
          done
