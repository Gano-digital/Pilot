# Escaneo de secretos en el árbol del repositorio (TruffleHog OSS).
name: Secret scan (TruffleHog)

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trufflehog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@v3
        with:
          path: ./
          extra_args: --only-verified --exclude-paths=.truffleignore
