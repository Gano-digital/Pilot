# Escaneo de secretos solo en código propio (imagen oficial TruffleHog).
name: Secret scan (TruffleHog)

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trufflehog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan Gano custom paths (Docker)
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          for target in wp-content/mu-plugins wp-content/themes/gano-child wp-content/plugins/gano-*; do
            echo "::group::Scan $target"
            docker run --rm -v "$PWD:/pwd" -w /pwd \
              trufflesecurity/trufflehog:latest \
              filesystem "/pwd/$target" --only-verified
            echo "::endgroup::"
          done
