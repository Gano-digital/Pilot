name: Deploy WordPress to GoDaddy via rsync

# Required GitHub Secrets:
# SERVER_HOST  - GoDaddy SSH/SFTP hostname (e.g. l9w.f71.myftpupload.com)
# SERVER_USER  - GoDaddy cPanel / SSH username
# PRIVATE_KEY  - SSH private key contents (public key authorized in cPanel)

on:
  workflow_dispatch:
    inputs:
      deployment_dest:
        description: 'Target server directory, leave blank for root directory'
        required: false
        default: ''

concurrency:
  group: wordpress-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Verify required secrets
        run: |
          MISSING=0
          if [ -z "${{ secrets.SERVER_HOST }}" ]; then echo "::error::SERVER_HOST missing."; MISSING=1; fi
          if [ -z "${{ secrets.SERVER_USER }}" ]; then echo "::error::SERVER_USER missing."; MISSING=1; fi
          if [ -z "${{ secrets.PRIVATE_KEY }}" ]; then echo "::error::PRIVATE_KEY missing."; MISSING=1; fi
          [ "$MISSING" -eq 1 ] && exit 1
          echo "OK: All required secrets are present."

      - name: Synchronize Files with GoDaddy WordPress Hosting Server
        uses: godaddy-wordpress/gd-wordpress-deployer@v1
        with:
          remote_host: ${{ secrets.SERVER_HOST }}
          ssh_user: ${{ secrets.SERVER_USER }}
          ssh_private_key: ${{ secrets.PRIVATE_KEY }}
          deployment_dest: ${{ github.event.inputs.deployment_dest }}
