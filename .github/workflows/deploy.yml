name: 🚀 Deploy Gano Digital → Production

on:
  push:
    branches: [main]
    paths:
      - 'wp-content/themes/gano-child/**'
      - 'wp-content/plugins/gano-*/**'
      - 'wp-content/mu-plugins/**'
      - '.htaccess'

  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # JOB 1: Security Scan — No credentials in code
  # ──────────────────────────────────────────────────────────────────────────
  security-check:
    name: 🔐 Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check for hardcoded credentials
        run: |
          # Fail if any PHP credential patterns are found outside .gsd/
          if grep -rE "(SSH_PASS\s*=|password\s*=\s*['\"][^'\"\$])" \
            --include="*.php" --include="*.py" \
            --exclude-dir=".gsd" --exclude-dir="vendor" .; then
            echo "❌ Credenciales en texto plano detectadas. Usa GitHub Secrets."
            exit 1
          fi
          echo "✅ Sin credenciales expuestas."

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 2: Deploy Theme + Plugins via SSH
  # ──────────────────────────────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to ${{ github.event.inputs.environment || 'production' }}
    runs-on: ubuntu-latest
    needs: security-check
    environment:
      name: ${{ github.event.inputs.environment || 'production' }}
      url: https://gano.digital

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: false  # .gsd no se despliega al servidor

      - name: Setup SSH Agent
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.SSH }}

      - name: Add server to known_hosts
        run: |
          ssh-keyscan -H 72.167.102.145 >> ~/.ssh/known_hosts

      - name: 📦 Deploy Child Theme
        run: |
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='*.map' \
            wp-content/themes/gano-child/ \
            f1rml03th382@72.167.102.145:/home/f1rml03th382/public_html/wp-content/themes/gano-child/

      - name: 📦 Deploy Custom Plugins
        run: |
          set -euo pipefail
          REMOTE="f1rml03th382@72.167.102.145"
          RPLUG="/home/f1rml03th382/public_html/wp-content/plugins"
          sync_if_exists() {
            local name="$1"
            local src="wp-content/plugins/${name}"
            if [ ! -d "$src" ]; then
              echo "⏭️ Omitido (no existe en repo): ${name}"
              return 0
            fi
            echo "📤 Sincronizando ${name}..."
            rsync -avz --delete --exclude='.git' "${src}/" "${REMOTE}:${RPLUG}/${name}/"
          }
          sync_if_exists "gano-content-importer"
          sync_if_exists "gano-phase3-content"
          sync_if_exists "gano-wompi-integration"
          sync_if_exists "gano-reseller-enhancements"

      - name: 📦 Deploy MU Plugins
        run: |
          rsync -avz \
            wp-content/mu-plugins/gano-security.php \
            wp-content/mu-plugins/gano-seo.php \
            wp-content/mu-plugins/gano-agent-core.php \
            f1rml03th382@72.167.102.145:/home/f1rml03th382/public_html/wp-content/mu-plugins/

      - name: 🔄 Flush WordPress Cache
        run: |
          ssh f1rml03th382@72.167.102.145 \
            "cd /home/f1rml03th382/public_html && wp cache flush --allow-root 2>/dev/null || true"

      - name: ✅ Verify Deployment
        run: |
          set -euo pipefail
          HTTP_STATUS=""
          for i in 1 2 3 4 5; do
            HTTP_STATUS=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 25 https://gano.digital || echo "000")
            if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 400 ]; then
              echo "✅ Sitio respondiendo: HTTP $HTTP_STATUS"
              exit 0
            fi
            echo "Reintento $i/5 — HTTP $HTTP_STATUS"
            sleep 8
          done
          echo "❌ Sitio no responde correctamente tras reintentos: HTTP $HTTP_STATUS"
          exit 1

      - name: 📊 Deployment Summary
        if: always()
        run: |
          echo "## 🚀 Deployment Report" >> $GITHUB_STEP_SUMMARY
          echo "- **Servidor**: 72.167.102.145 (gano.digital)" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Timestamp**: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_STEP_SUMMARY
