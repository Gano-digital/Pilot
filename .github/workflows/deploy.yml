# UI Actions: 04 · Deploy · Producción (rsync)
name: "04 · Deploy · Producción (rsync)"

on:
  push:
    branches: [main]
    paths:
      - 'wp-content/themes/gano-child/**'
      - 'wp-content/plugins/gano-*/**'
      - 'wp-content/mu-plugins/**'
      - '.htaccess'
      - '.github/workflows/deploy.yml'

  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # JOB 1: Security Scan — No credentials in code
  # ──────────────────────────────────────────────────────────────────────────
  security-check:
    name: 🔐 Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Solo código Gano (no vendor / plugins de terceros: WooCommerce, EA, etc. disparan falsos positivos).
      - name: Check for hardcoded credentials
        run: |
          set -euo pipefail
          FOUND=0
          scan_dir() {
            local d="$1"
            [ -e "$d" ] || return 0
            if grep -rE "(SSH_PASS\s*=|password\s*=\s*['\"][^'\"\$])" \
              --include="*.php" --include="*.py" \
              "$d" 2>/dev/null; then
              FOUND=1
            fi
          }
          for d in wp-content/themes/gano-child wp-content/mu-plugins scripts .github; do
            scan_dir "$d"
          done
          for d in wp-content/plugins/gano-*; do
            [ -d "$d" ] || continue
            scan_dir "$d"
          done
          if [ "$FOUND" -ne 0 ]; then
            echo "❌ Posible credencial en texto plano en código Gano. Usa GitHub Secrets."
            exit 1
          fi
          echo "✅ Sin credenciales expuestas (paths Gano)."

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 2: Deploy Theme + Plugins via SSH
  # Requiere secrets: SSH, SERVER_HOST, SERVER_USER, DEPLOY_PATH
  # ssh-add / libcrypto: memory/ops/github-actions-ssh-secret-troubleshooting.md
  # ──────────────────────────────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to ${{ github.event.inputs.environment || 'production' }}
    runs-on: ubuntu-latest
    needs: security-check
    environment:
      name: ${{ github.event.inputs.environment || 'production' }}
      url: https://gano.digital

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: false

      - name: Setup SSH Agent
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.SSH }}

      - name: Add server to known_hosts
        run: |
          ssh-keyscan -H "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts

      - name: 📦 Deploy Child Theme
        run: |
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='*.map' \
            wp-content/themes/gano-child/ \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${{ secrets.DEPLOY_PATH }}/wp-content/themes/gano-child/"

      - name: 📦 Deploy Custom Plugins
        run: |
          set -euo pipefail
          REMOTE="${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}"
          RPLUG="${{ secrets.DEPLOY_PATH }}/wp-content/plugins"
          sync_if_exists() {
            local name="$1"
            local src="wp-content/plugins/${name}"
            if [ ! -d "$src" ]; then
              echo "⏭️ Omitido (no existe en repo): ${name}"
              return 0
            fi
            echo "📤 Sincronizando ${name}..."
            rsync -avz --delete --exclude='.git' "${src}/" "${REMOTE}:${RPLUG}/${name}/"
          }
          sync_if_exists "gano-content-importer"
          sync_if_exists "gano-phase3-content"
          sync_if_exists "gano-reseller-enhancements"
          # Legacy / archivado — solo si el directorio existe en el clon
          sync_if_exists "gano-wompi-integration"

      - name: 📦 Deploy MU Plugins (Fase 1-3)
        run: |
          rsync -avz \
            wp-content/mu-plugins/gano-security.php \
            wp-content/mu-plugins/gano-seo.php \
            wp-content/mu-plugins/gano-agent-core.php \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${{ secrets.DEPLOY_PATH }}/wp-content/mu-plugins/"

      - name: 🔄 Flush WordPress Cache
        run: |
          ssh "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" \
            "cd ${{ secrets.DEPLOY_PATH }} && wp cache flush --allow-root 2>/dev/null || true"

      - name: ✅ Verify Deployment
        run: |
          set -euo pipefail
          HTTP_STATUS=""
          for i in 1 2 3 4 5; do
            HTTP_STATUS=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 25 https://gano.digital || echo "000")
            if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 400 ]; then
              echo "✅ Sitio respondiendo: HTTP $HTTP_STATUS"
              exit 0
            fi
            echo "Reintento $i/5 — HTTP $HTTP_STATUS"
            sleep 8
          done
          echo "❌ Sitio no responde correctamente tras reintentos: HTTP $HTTP_STATUS"
          exit 1

      - name: 📊 Deployment Summary
        if: always()
        run: |
          echo "## 🚀 Deployment Report" >> $GITHUB_STEP_SUMMARY
          echo "- **Destino**: gano.digital (paths vía secrets)" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Timestamp**: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_STEP_SUMMARY
