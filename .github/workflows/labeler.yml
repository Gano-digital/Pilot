# Requiere etiquetas creadas (ejecutar una vez: 06 · Repo · Crear etiquetas GitHub).
name: "03 · PR · Etiquetas automáticas"

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  labeler:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/labeler@v6
