name: "11 · Agentes · Setup pasos Copilot"

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mysql, xml, curl, mbstring, zip, gd, intl
          tools: composer, wp-cli

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install system tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq jq

      - name: Verify environment
        run: |
          echo "PHP version:"
          php -v
          echo "WP-CLI version:"
          wp --version || echo "wp-cli not in PATH"
          echo "Node version:"
          node -v
          echo "jq version:"
          jq --version

      - name: PHP lint on Gano custom code
        shell: bash
        run: |
          set -euo pipefail
          echo "Linting Gano custom PHP (falla si hay error de sintaxis)..."
          find wp-content/themes/gano-child -name "*.php" -exec php -l {} \;
          while IFS= read -r -d '' dir; do
            find "$dir" -name "*.php" -exec php -l {} \;
          done < <(find wp-content/plugins -maxdepth 1 -type d -name 'gano-*' -print0 2>/dev/null || true)
          find wp-content/mu-plugins -maxdepth 1 -name "gano-*.php" -exec php -l {} \;
          echo "PHP lint complete."
