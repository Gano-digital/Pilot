# Comparación repo ↔ servidor para archivos clave Fase 1–3 (manual).
# Requiere secrets: SSH, SERVER_HOST, SERVER_USER, DEPLOY_PATH
name: "05 · Ops · Verificar parches en servidor"

on:
  workflow_dispatch:
    inputs:
      upload_missing:
        description: 'Subir archivos faltantes/desactualizados al servidor'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: read

jobs:
  verify:
    name: 🔍 Comparar repo vs servidor (Fase 1-3)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup SSH Agent
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.SSH }}

      - name: Add server to known_hosts
        run: |
          ssh-keyscan -H "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts

      - name: 📋 Calcular checksums locales (repo)
        run: |
          echo "=== Checksums en repo ===" | tee /tmp/local_checksums.txt
          for f in \
            wp-content/mu-plugins/gano-security.php \
            wp-content/mu-plugins/gano-seo.php \
            wp-content/themes/gano-child/functions.php \
            wp-content/themes/gano-child/js/gano-chat.js \
            wp-content/themes/gano-child/style.css; do
            if [ -f "$f" ]; then
              md5sum "$f" | tee -a /tmp/local_checksums.txt
            else
              echo "MISSING_IN_REPO $f" | tee -a /tmp/local_checksums.txt
            fi
          done

      - name: 📋 Calcular checksums remotos (servidor)
        env:
          REMOTE: ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}
          BASE: ${{ secrets.DEPLOY_PATH }}
        run: |
          echo "=== Checksums en servidor (normalizados a ruta repo) ===" | tee /tmp/remote_checksums.txt
          for f in \
            wp-content/mu-plugins/gano-security.php \
            wp-content/mu-plugins/gano-seo.php \
            wp-content/themes/gano-child/functions.php \
            wp-content/themes/gano-child/js/gano-chat.js \
            wp-content/themes/gano-child/style.css; do
            line=$(ssh "$REMOTE" "if [ -f \"$BASE/$f\" ]; then md5sum \"$BASE/$f\" | awk -v rel=\"$f\" '{print \$1, rel}'; else echo MISSING_ON_SERVER $f; fi" || echo "SSH_FAIL $f")
            echo "$line" | tee -a /tmp/remote_checksums.txt
          done

      - name: 🔎 Comparar checksums y reportar gaps
        id: compare
        run: |
          echo "## 🔍 Verificación Parches Fase 1-3" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Archivo | Estado |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY

          GAPS=0
          for f in \
            wp-content/mu-plugins/gano-security.php \
            wp-content/mu-plugins/gano-seo.php \
            wp-content/themes/gano-child/functions.php \
            wp-content/themes/gano-child/js/gano-chat.js \
            wp-content/themes/gano-child/style.css; do

            if grep -q "MISSING_IN_REPO $f" /tmp/local_checksums.txt; then
              STATUS="⚠️ Falta en repo"
              GAPS=$((GAPS+1))
            elif grep -q "MISSING_ON_SERVER $f\|SSH_FAIL $f" /tmp/remote_checksums.txt; then
              STATUS="🔴 Falta en servidor o error SSH"
              GAPS=$((GAPS+1))
            else
              LHASH=$(grep -F "$f" /tmp/local_checksums.txt | head -1 | awk '{print $1}')
              RHASH=$(grep -F "$f" /tmp/remote_checksums.txt | head -1 | awk '{print $1}')
              if [ -z "$LHASH" ] || [ -z "$RHASH" ]; then
                STATUS="🟡 No se pudo comparar (revisar logs)"
                GAPS=$((GAPS+1))
              elif [ "$LHASH" = "$RHASH" ]; then
                STATUS="✅ Sincronizado"
              else
                STATUS="🟡 Desactualizado en servidor"
                GAPS=$((GAPS+1))
              fi
            fi

            echo "| \`$f\` | $STATUS |" >> $GITHUB_STEP_SUMMARY
          done

          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "$GAPS" -gt 0 ]; then
            echo "**Se detectaron $GAPS gap(s).** Opcional: ejecutar de nuevo con \`upload_missing=true\`." >> $GITHUB_STEP_SUMMARY
          else
            echo "**Todos los archivos comparados coinciden (checksum).**" >> $GITHUB_STEP_SUMMARY
          fi
          echo "gaps=$GAPS" >> $GITHUB_OUTPUT

      - name: 📤 Subir parches Fase 1-3 al servidor
        if: ${{ github.event.inputs.upload_missing == 'true' && steps.compare.outputs.gaps != '0' }}
        run: |
          echo "Sincronizando MU Plugins..."
          rsync -avz \
            wp-content/mu-plugins/gano-security.php \
            wp-content/mu-plugins/gano-seo.php \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${{ secrets.DEPLOY_PATH }}/wp-content/mu-plugins/"

          echo "Sincronizando Child Theme..."
          rsync -avz \
            wp-content/themes/gano-child/functions.php \
            wp-content/themes/gano-child/style.css \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${{ secrets.DEPLOY_PATH }}/wp-content/themes/gano-child/"

          rsync -avz \
            wp-content/themes/gano-child/js/gano-chat.js \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${{ secrets.DEPLOY_PATH }}/wp-content/themes/gano-child/js/"

          echo "✅ Parches subidos." >> $GITHUB_STEP_SUMMARY

      - name: 🔄 Flush caché WordPress (post-upload)
        if: ${{ github.event.inputs.upload_missing == 'true' && steps.compare.outputs.gaps != '0' }}
        run: |
          ssh "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" \
            "cd ${{ secrets.DEPLOY_PATH }} && wp cache flush --allow-root 2>/dev/null || true"
