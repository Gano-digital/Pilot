name: Security Audit

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ secrets.PRIVATE_KEY }}

      - name: Verificar permisos en rutas críticas
        run: |
          ssh user@160.153.0.23 << 'EOF'
          echo "Listando directorios críticos..."
          ls -la /var/www
          ls -la /home
          ls -la /etc
          echo "Revisión completada"
          EOF
