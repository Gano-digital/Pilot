# Etiquetas automáticas por ruta (actions/labeler).
# Requiere que existan las etiquetas en el repo o permiso issues: write para crearlas.

changed-files-labels-limit: 8

area:theme:
  - changed-files:
      - any-glob-to-any-file: "wp-content/themes/gano-child/**"

area:mu-plugins:
  - changed-files:
      - any-glob-to-any-file: "wp-content/mu-plugins/**"

area:plugins-gano:
  - changed-files:
      - any-glob-to-any-file: "wp-content/plugins/gano-*/**"

area:ci:
  - changed-files:
      - any-glob-to-any-file: ".github/**"

ops-branch:
  - head-branch: ["^ops/"]

feature-branch:
  - head-branch: ["^feature/"]
