# Etiquetas automáticas por ruta (actions/labeler).
# Las claves con ":" deben ir entre comillas en YAML.

changed-files-labels-limit: 8

"area:theme":
  - changed-files:
      - any-glob-to-any-file: "wp-content/themes/gano-child/**"

"area:mu-plugins":
  - changed-files:
      - any-glob-to-any-file: "wp-content/mu-plugins/**"

"area:plugins-gano":
  - changed-files:
      - any-glob-to-any-file: "wp-content/plugins/gano-*/**"

"area:ci":
  - changed-files:
      - any-glob-to-any-file: ".github/**"

ops-branch:
  - head-branch: ["^ops/"]

feature-branch:
  - head-branch: ["^feature/"]
